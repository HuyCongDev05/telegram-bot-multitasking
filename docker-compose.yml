services:
  tgbot:
    build: .
    container_name: sheerid-tgbot
    restart: unless-stopped

    # Biến môi trường
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - PYTHONUNBUFFERED=1
      # Cấu hình Telegram Bot
      - BOT_TOKEN=${BOT_TOKEN}
      - CHANNEL_USERNAME=${CHANNEL_USERNAME:-hcongdev}
      - CHANNEL_URL=${CHANNEL_URL:-https://t.me/}
      - ADMIN_USER_ID=${ADMIN_USER_ID}
      # Cấu hình PostgreSQL (Supabase)
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - DB_NAME=${DB_NAME:-postgres}

    # Mở cổng cho Web Server
    ports:
      - "8080:8080"

    # Lưu trữ dữ liệu lâu dài
    volumes:
      - ./logs:/app/logs

    # Cấu hình nhật ký (Logs)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Chế độ mạng
    network_mode: bridge
